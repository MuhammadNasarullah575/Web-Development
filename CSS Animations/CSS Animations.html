<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animations</title>
    <style>
        .container {
            background-color: rgb(1, 121, 121);
            height: 80vh;
            width: 30vw;
        }

        .box {
            width: 34px;
            height: 45px;
            /* background-color: aqua; */
            /* animation-name: NasirKaAnimations;
            animation-duration: 3s;
            animation-iteration-count: infinite;
            animation-timing-function: cubic-bezier(0.42, 0, 0, 1.1);
            animation-delay: 1s; */
            /* animation-direction: reverse; */
            /* animation-direction: alternate-reverse; */
            /* animation-play-state: paused; */

            /* sub properties ko eik line mein likhny k liye following line likhi jaati hai */
            /* animation: name duration timing-function delay iteration-count direction fill-mode; */
            /* animation: NasirKaAnimations 3s ease-in-out 1s backwards ; */

            animation: NasirKaAnimations 2s ease-in-out 3s 1, 
                        Harry2 3s ease-in-out 3s 1; 
        }

        @keyframes NasirKaAnimations {
            from {
                background-color: red;
            }

            to {
                transform: translateX(1000px);
                background-color: yellow;
            }
        }
        @keyframes Harry2{
            0%{
                transform: rotate(100deg);
            }
            20%{
                transform: rotate(200deg);
            }
            50%{
                transform: rotate(220deg);
            }
            80%{
                transform: rotate(300deg);
            }
            100%{
                transform: rotate(310deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box">Box</div>
    </div>
</body>

</html>
