<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 5 Self Attempt After Solution</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        header{
            position: sticky;
            top: 0px;
        }
        nav{
            height: 10vh;
            background-color: pink;
        }
        main{
            background-color: black;
            color: white;
            padding: 10px;
        }
        .container{
            background-color: green;
            width: 75%;
            /* height: 70vh; */
            margin: 10px auto;
            text-align: center;
        }
        .box1{
            background-color: rgb(243, 172, 90);
            height: 70vh;
            display: inline-flex;
            width: 35%;
            margin: 20px 20px;

        }
        .box2{
            background-color: blue;
            height: 70vh;
            display: inline-flex;
            width: 35%;
            margin: 20px 20px;
        }
        .text-box{
            height: 10vh;
            width: 60%;
            margin: 20px auto;
            border: 2px solid white;
            border-radius: 55px;
            padding: 80px 30px;
            box-sizing: border-box;
            text-align: center;
            font-size: 2em;
        }
        .circle{
            height: 50px;
            width: 50px;
            border: 1px solid black;
            border-radius: 50%;
            background-color: orange;
            right: 10px;
            bottom: 10px;
            position: fixed;
        }
        footer{
            height: 10vh;
            width: 100%;
            background-color: beige;
        }
    </style>
</head>
<body>
    <header>
        <nav></nav>
    </header>

    <main>
        <div class="container">
            <div class="box1"></div>
            <div class="box2"></div>
        </div>

        <div class="text-box">
            <p>Welcome to this Sigma Development Express.</p>
        </div>

        <div class="circle"></div>
    </main>

    <footer></footer>
</body>
</html>
