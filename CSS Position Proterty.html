<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position Property</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
         .box {
            border: 2px solid black;
            height: 433px;
            width: 80vw;
            padding: 3px;
            margin: 3px;
        }

        .box1 {
            background-color: aqua;
            position: absolute;
            top: 10px; /*Basically top ki value apny parent ki position k according set hoti agar parent kissi position par set hai to us k according top value set ho gi otherwise yeh dada par dada sy pochy ga r pardada k according apni value set kar lay ga */
            left: 3px;
            /* position: sticky;
            top: 0px;
            height: 111px;
            width: 100%;
            margin: 0;
            padding: 0; */

        }

        .box2 {
            background-color: blue;
            /* Bi default position static hoti jis par hum direct top/left nahi lga sakty usko resolve karny k liye hum position relative ka use karty */
            /* position: relative;
            top: 34px;
            left: 56px; */
        }

        .box3 {
            background-color: blueviolet;
            /* position: fixed;
            bottom: 0px;
            left: 6vw;
            height: 111px; */
        }

        .box4 {
            background-color: brown;
        }

       
        .parent{
            padding: 43px;
            margin: 34px;
            border: 3px solid purple;
            position: absolute;
            
            /* Exception Transform, filter or perspective properties can also make an elemennt as positioned */

            /* transform: translate(0); */
            /* filter: invert(0); */
            /* perspective: 0em; */


        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>

</body>

</html>
