<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Self Practice</title>
    <style>
        .container {
            height: 75vh;
            border: 2px solid black;
            display: grid;
            grid-template-columns: repeat(5, 260px);
            grid-template-rows: repeat(5, 100px);
            justify-content: center;
            align-content: center;
            padding: 55px;

        }

        .items {
            width: 55px;
            height: 55px;
            border: 2px solid black;
            background-color: darkmagenta;
            color: white;
            align-content: center;
            text-align: center;
        }

        .item-1{
            align-self: center;
            justify-self: center;
        }

        .item-2{
            grid-row: 5/6;
            grid-column: 1/2;
            align-self: center;
            justify-self: center;
        }
        .item-3{
            grid-row: 3/4;
            grid-column: 3/4;
            align-self: center;
            justify-self: center;
        }
        .item-4{
            grid-row: 1/2;
            grid-column: 5/6;
            align-self: center;
            justify-self: center;
        }
        .item-5{
            grid-row: 5/6;
            grid-column: 5/6;
            align-self: center;
            justify-self: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="items item-1">1</div>
        <div class="items item-2">2</div>
        <div class="items item-3">3</div>
        <div class="items item-4">4</div>
        <div class="items item-5">5</div>
    </div>
</body>

</html>
