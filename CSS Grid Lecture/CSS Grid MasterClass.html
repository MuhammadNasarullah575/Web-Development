<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Master Class</title>
    <style>
        .container {
            width: 80vw;
            height: 100vh; 
            border: 2px solid black;
            display: grid;
            /* grid-template-columns: 120px 100px;
            grid-template-rows: 100px 100px 100px; */
            /* gap: 34px; */
            row-gap: 10px;
            column-gap: 20px;
            /* justify-items: center;
            align-items: center; */

            /* justify-content: center;
            align-content: center; */

            place-content: center; /*yeh justify-content r align-content ka single line mein alternate hai  */

            /* justify-content: ; align-content: ; yeh dono tab apply hoti jab container bara ho r us container mein grid aa jaye phir poori grid ko hum center kar sakty horizontally and vertically
            jabky justify-item r align-item ki bi cell k under use hota */

            /*3 equal fractions mein convert kar day ga */
            /* grid-template-columns: 1fr 1fr 1fr;   */
            /* grid-template-columns: repeat(4,minmax(100px,1fr));  iska matlab min 100px r max 1fr*/
            grid-template-columns: repeat(2,80px);
            grid-template-rows: repeat(2,80px);
        }

        .item {
            border: 2px solid red;
            height: 55px;
            width: 55px;
        }

        .item-4 {
            grid-row: 1/2;
            /* Grid-row 1 sy 2 tak ho jaye */
            grid-column: 1/2;
            /* Grid-column 1 sy 2 tak ho jaye */
            align-self: start;
            justify-self: start;
        }

        /* following code item-1 r item-4 ko overlap karany k liye likha gya hai  */
        .item-1 {
            /* grid-row: 1/2; Another way to write same thing is below */
            grid-row-start: 1;
            grid-row-end: 2;
            grid-column: 1/2;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="item item-1">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item item-4">4</div>
        <div class="item">5</div>
    </div>
</body>

</html>
