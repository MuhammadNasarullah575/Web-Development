<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Rules</title>
    <style>
        h1{    /*element selector */
            color: aqua;
        }
        .yellow{    /*Class Selector */
            color: yellow;
        }
        .cred{
            color: red;
        }
        .cpurple{
            color: purple;
        }
        #title{
            color: orange;
        }
    </style>
</head>
<body>
    <div>
        <h1 id="title"  class="yellow cred cpurple">CSS Specificions</h1>
    </div>
</body>
</html>
