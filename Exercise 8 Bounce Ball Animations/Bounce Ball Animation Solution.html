<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bounce Ball Animation Solution</title>
    <style>
        .container{
            width: 70%;
            height: 70vh;
            background-color: blue;
            position: relative;
        }
        .ball{
            width: 70px;
            height: 70px;
            background-color: red;
            border-radius: 50%;
            margin: 0 10px;
            position: absolute;
            bottom: 0;
            left: 0;
            animation: animateX 3s linear infinite,animateY 1s ease-out infinite alternate;
        }
        @keyframes animateX{
            from{
                left: 0;
            }
            to{
                left: 100%;
            }
        }

        @keyframes animateY{
            from{
                bottom: 0;
            }
            to{
                bottom: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ball"></div>
    </div>
</body>
</html>
