<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows Animations</title>
    <style>
        .container {
            width: 80%;
            height: 70vh;
            background-color: blue;
        }

        .window {
            display: grid;
            grid-template-columns: repeat(2, 100px);
            justify-content: center;
            align-items: center;
            gap: 4px;
            padding-top: 10px;
        }

        .box {
            width: 100px;
            height: 100px;
            gap: 10px;
            animation: WindowAnimation 10s ease-in-out 1s infinite;
        }

        .box1 {
            background-color: red;
            /* box-shadow: horizontal vertical blur color; */
            box-shadow: 10px 10px 50px rgb(247, 222, 222);
        }

        .box2 {
            background-color: green;
            box-shadow: 10px 10px 50px rgb(211, 250, 211);
        }

        .box3 {
            background-color: yellow;
            box-shadow: 10px 10px 50px rgb(250, 250, 205);
        }

        .box4 {
            background-color: skyblue;
            box-shadow: 10px 10px 50px rgb(239, 251, 255);
        }

        @keyframes WindowAnimation {
            0% {
                transform: scale(0);
                border-radius: 50%;
            }

            100% {
                transform: scale(1);
                border-radius: 0%;
            }
        }

        .window-bar {
            margin: 0 auto;
            width: 27%;
            height: 35vh;
        }


        .First-text {
            color: white;
            font-size: xx-large;
            font-weight: bold;
            font-family: sans-serif;
        }

        .small {
            font-size: 100;
            color: white;
        }

        .bar {
            width: 80%;
            margin: 15px auto;
            height: 10px;
            background-color: white;
            border: none;
            border-radius: 10px;
            display: flex;
            align-items: center;
        }

        .circle {
            height: 10px;
            width: 10px;
            background-color: black;
            margin: 0 4px;
             animation: circleAnimate 1s ease-in-out 0.5s infinite;
             border-radius: 50%;
        }
        


        @keyframes circleAnimate {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(180px);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="window">
            <div class="box box1"></div>
            <div class="box box2"></div>
            <div class="box box3"></div>
            <div class="box box4"></div>
        </div>

        <div class="window-bar">
            <span class="First-text">Windows 7</span>
            <span class="small">Xp Professional</span>

            <div class="bar">
                <div class="circle circle1"></div>
                <div class="circle circle2"></div>
                <div class="circle circle3"></div>
            </div>
        </div>
    </div>
</body>

</html>
