<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice NavBar After Solution</title>
    <style>
        nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .right ul {
            display: flex;
            gap: 33px;
        }

        .right li {
            list-style: none;
            display: flex;
            align-items: center;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                <img src="Logo-removebg-preview.png" alt="logo">
            </div>

            <div class="right">
                <ul>
                    <li>
                        <span>Products</span>
                        <img src="arrow-down-01-stroke-rounded.svg" alt="arrow-symbol" width="20px" height="20px">
                    </li>

                    <li>
                        <span>Pricing</span>
                        <img src="arrow-down-01-stroke-rounded.svg" alt="arrow-symbol" width="20px" height="20px">
                    </li>

                    <li>
                        <span>Listing</span>
                        <img src="arrow-down-01-stroke-rounded.svg" alt="arrow-symbol" width="20px" height="20px">
                    </li>

                    <li>
                        <span>About Us</span>
                        <img src="arrow-down-01-stroke-rounded.svg" alt="arrow-symbol" width="20px" height="20px">
                    </li>
                </ul>
            </div>
        </nav>
    </header>
</body>

</html>
